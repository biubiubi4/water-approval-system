server:
  port: 8080

spring:
  application:
    name: water-approval-backend
  datasource:
    url: jdbc:h2:mem:waterapproval
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  ai-service-base-url: ${AI_SERVICE_BASE_URL:http://127.0.0.1:8000}