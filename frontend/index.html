<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小型水库安全监测智能大屏</title>
    <!-- 引入 Leaflet (开源的轻量级 GIS 地图库) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 引入 ECharts (数据可视化图表库) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1426; /* 暗色科技大屏风格 */
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(to bottom, #112d59, #0b1426);
            border-bottom: 2px solid #1f4e99;
            text-shadow: 0 0 10px #00aaff;
        }
        .container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }
        .panel {
            background-color: rgba(16, 36, 70, 0.6);
            border: 1px solid #1f4e99;
            border-radius: 8px;
            padding: 15px;
            box-shadow: inset 0 0 20px rgba(0, 170, 255, 0.2);
            display: flex;
            flex-direction: column;
        }
        .map-panel {
            flex: 2;
        }
        .data-panel {
            flex: 1;
            min-width: 400px;
        }
        .panel-title {
            font-size: 18px;
            margin-bottom: 15px;
            border-left: 4px solid #00e5ff;
            padding-left: 10px;
        }
        #map {
            flex: 1;
            border-radius: 4px;
            background-color: #eee; /* 预留给地图的底色 */
        }
        #chart {
            flex: 1;
            min-height: 300px;
        }
        .reservoir-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }
        .reservoir-item {
            background: #112d59;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reservoir-item:hover, .reservoir-item.active {
            background: #1f4e99;
            border-left: 4px solid #00ffaa;
        }
        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-safe { background: #00b894; }
        .status-warn { background: #ff9f43; color: #111; }
        .status-critical { 
            background: #ff4757; 
            animation: pulse-border 1.5s infinite; 
            font-weight: bold;
        }

        /* 呼吸警报灯动画效果 */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
        @keyframes pulse-marker {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(3); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* 分组折叠下拉列表样式 */
        details.category-group {
            margin-bottom: 12px;
            background: rgba(17, 45, 89, 0.4);
            border-radius: 6px;
            border: 1px solid #1f4e99;
        }
        details.category-group summary {
            background: #112d59;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            outline: none;
            user-select: none;
            color: #00e5ff;
        }
        details.category-group summary:hover {
            background: #1f4e99;
        }

        /* 新增 KPI 数据卡片样式 */
        .kpi-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .kpi-card { flex: 1; background: rgba(0, 229, 255, 0.1); border: 1px solid #00e5ff; border-radius: 6px; padding: 15px; text-align: center; box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .kpi-value { font-size: 28px; font-weight: bold; color: #00ffaa; margin: 10px 0 5px; text-shadow: 0 0 8px #00ffaa; }
        .kpi-label { font-size: 14px; color: #ccc; }
        .warn-text { color: #ff4757; text-shadow: 0 0 8px #ff4757; }
    </style>
</head>
<body>

    <div class="header">🌊 小型水库安全监测与预警系统 (基于 API 数据)</div>

    <div class="container">
        <!-- 左侧：GIS 空间展示 -->
        <div class="panel map-panel">
            <div class="panel-title">水利要素地理空间分布 (GIS)</div>
            <div id="map"></div>
        </div>

        <!-- 右侧：数据与时序监测图表 -->
        <div class="panel data-panel">
            <!-- 新增：KPI 数据总览看板 -->
            <div class="kpi-row">
                <div class="kpi-card">
                    <div class="kpi-label">接入水库总数</div>
                    <div class="kpi-value" id="kpiTotal">--</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">当前报警设施</div>
                    <div class="kpi-value warn-text" id="kpiWarn">--</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">监测站在线率</div>
                    <div class="kpi-value">100%</div>
                </div>
            </div>

            <div class="panel-title">水库状态列表</div>
            
            <details class="category-group" id="warnDetails" open>
                <summary>🚨 异常/预警水库 (<span id="warnCountLabel">0</span>)</summary>
                <ul class="reservoir-list" id="warnList" style="margin-top: 10px;">
                    <li style="text-align: center; color: #888;">加载中...</li>
                </ul>
            </details>

            <details class="category-group" id="safeDetails">
                <summary>✅ 常规安全水库 (<span id="safeCountLabel">0</span>)</summary>
                <ul class="reservoir-list" id="safeList" style="margin-top: 10px;">
                    <li style="text-align: center; color: #888;">加载中...</li>
                </ul>
            </details>

            <div class="panel-title" style="margin-top: 15px;">24小时实时水位监测趋势</div>
            <div id="chart"></div>
        </div>
    </div>

    <script>
        // API 基础路径
        const API_BASE = 'http://127.0.0.1:8000/api/v1';

        // 1. 初始化 Leaflet 地图
        const map = L.map('map').setView([29.8, 119.6], 8); // 视角定在浙江杭州附近
        
        // 使用天地图 (国内访问较快的开放服务瓦片) - 矢量底图
        L.tileLayer('https://t0.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=ebf64362215c081f8317203220f133eb', {
            attribution: '© 天地图',
            maxZoom: 18
        }).addTo(map);

        // 新增：天地图文本注记图层 (用来显示城市、道路、水系等名称)
        L.tileLayer('https://t0.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILECOL={x}&TILEROW={y}&TILEMATRIX={z}&tk=ebf64362215c081f8317203220f133eb', {
            maxZoom: 18
        }).addTo(map);

        // 2. 初始化 ECharts 图表
        const chart = echarts.init(document.getElementById('chart'));

        // 3. 全局变量，记录所有图钉
        let markers = [];

        // 4. 获取水库列表数据并渲染
        async function fetchReservoirs() {
            try {
                const response = await fetch(`${API_BASE}/reservoirs/`);
                const data = await response.json();
                
                const warnListEl = document.getElementById('warnList');
                const safeListEl = document.getElementById('safeList');
                warnListEl.innerHTML = ''; // 清空预警列表
                safeListEl.innerHTML = ''; // 清空安全列表

                let warnCount = 0;
                let safeCount = 0;

                // 排序：同组内依旧按危急程度排
                data.items.sort((a, b) => b.warning_level - a.warning_level);

                data.items.forEach((item, index) => {
                    // --- 渲染左侧 HTML 列表 ---
                    const isWarn = item.warning_level > 0;
                    const isCritical = item.warning_level >= 3;
                    
                    let badgeClass = 'status-safe';
                    if (item.warning_level === 1 || item.warning_level === 2) badgeClass = 'status-warn';
                    if (isCritical) badgeClass = 'status-critical';

                    const li = document.createElement('li');
                    li.className = `reservoir-item ${index === 0 ? 'active' : ''}`;
                    li.innerHTML = `
                        <div>
                            <strong>${item.name}</strong><br>
                            <span style="font-size:12px; color:#aaa;">库容: ${item.storage_capacity}</span>
                        </div>
                        <span class="status-badge ${badgeClass}">${item.status}</span>
                    `;
                    // 点击列表项切换图表数据
                    li.onclick = () => {
                        document.querySelectorAll('.reservoir-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        fetchReadings(item.id, item.name);
                        map.setView([item.latitude, item.longitude], 12);
                    };

                    // 根据是否预警分发到不同分类下拉框中
                    if (isWarn) {
                        warnCount++;
                        warnListEl.appendChild(li);
                    } else {
                        safeCount++;
                        safeListEl.appendChild(li);
                    }

                    // --- 渲染地图图钉 (GIS) ---
                    let markerColor = 'green';
                    if(item.warning_level === 1 || item.warning_level === 2) markerColor = 'orange';
                    if(isCritical) markerColor = 'red';

                    const circle = L.circleMarker([item.latitude, item.longitude], {
                        color: markerColor,
                        fillColor: markerColor,
                        fillOpacity: isCritical ? 1 : 0.8,
                        radius: isCritical ? 10 : 7 // 严重警报的图钉会稍大一点
                    }).addTo(map);
                    
                    circle.bindPopup(`<b>${item.name}</b><br>状态: ${item.status}<br>经度: ${item.longitude}<br>纬度: ${item.latitude}`);
                    markers.push(circle);

                    // 如果是高风险，画一个虚拟的溃坝缓冲区 (缓冲区演示)
                    if (isWarn) {
                        L.circle([item.latitude, item.longitude], {
                            color: 'red',
                            fillColor: '#f03',
                            fillOpacity: 0.2,
                            radius: 5000 // 模拟5公里的危险缓冲区
                        }).addTo(map).bindPopup("预估溃坝5公里淹没缓冲区");
                    }
                });

                // 更新前端看板的汇总数据
                document.getElementById('kpiTotal').innerText = data.total;
                document.getElementById('kpiWarn').innerText = warnCount;
                
                // 更新下拉菜单标题上的数字徽标
                document.getElementById('warnCountLabel').innerText = warnCount;
                document.getElementById('safeCountLabel').innerText = safeCount;

                // 为了防止预警列表为空时难看，加个空状态提示
                if(warnCount === 0) warnListEl.innerHTML = '<li style="text-align: center; color: #888; padding: 10px;">目前全体水库水雨情安全，无预警。</li>';
                if(safeCount === 0) safeListEl.innerHTML = '<li style="text-align: center; color: #888; padding: 10px;">暂无安全水库。</li>';

                // 默认加载第一个水库的时序数据
                if (data.items.length > 0) {
                    fetchReadings(data.items[0].id, data.items[0].name);
                }

            } catch (error) {
                console.error('获取水库数据失败，请检查后端是否运行', error);
                document.getElementById('reservoirList').innerHTML = '<li style="color:red; text-align:center;">连接后端失败，请确保 uvicorn 在运行中！</li>';
            }
        }

        // 5. 获取时序监测数据并渲染至 ECharts
        async function fetchReadings(stationId, stationName) {
            chart.showLoading();
            try {
                // 并发请求【水位】和【降雨量】的数据
                const [resWater, resRain] = await Promise.all([
                    fetch(`${API_BASE}/readings/?station_id=${stationId}&metric_type=water_level&hours=24`),
                    fetch(`${API_BASE}/readings/?station_id=${stationId}&metric_type=rainfall&hours=24`)
                ]);
                
                const dataWater = await resWater.json();
                const dataRain = await resRain.json();

                const times = dataWater.data.map(d => d.reading_time.split(' ')[1]); 
                const waterValues = dataWater.data.map(d => d.sensor_value);
                const rainValues = dataRain.data.map(d => d.sensor_value);

                const option = {
                    title: { 
                        text: `${stationName} - 水情雨情联合测报`, 
                        textStyle: { color: '#00e5ff', fontSize: 14 } 
                    },
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['水位(米)', '降雨量(毫米)'], textStyle: { color: '#ccc' }, top: 0, right: 0 },
                    xAxis: {
                        type: 'category',
                        data: times,
                        axisLine: { lineStyle: { color: '#00e5ff' } },
                        axisLabel: { color: '#ccc' }
                    },
                    yAxis: [
                        {
                            type: 'value',
                            name: '水位 (m)',
                            min: 110,
                            axisLine: { lineStyle: { color: '#00e5ff' } },
                            splitLine: { show: false } // 水位不显示网格线避免缭乱
                        },
                        {
                            type: 'value',
                            name: '降雨量 (mm)',
                            min: 0,
                            max: 50,
                            inverse: true, // 特色：水文图中降雨量轴通常是倒挂在顶部的
                            nameLocation: 'start',
                            axisLine: { lineStyle: { color: '#4a90e2' } },
                            splitLine: { lineStyle: { color: '#1f4e99', type: 'dashed' } }
                        }
                    ],
                    series: [
                        {
                            name: '水位(米)',
                            data: waterValues,
                            type: 'line',
                            smooth: true,
                            yAxisIndex: 0,
                            itemStyle: { color: '#00ffaa' },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: 'rgba(0, 255, 170, 0.4)' },
                                    { offset: 1, color: 'rgba(0, 255, 170, 0)' }
                                ])
                            },
                            markLine: {
                                data: [{ yAxis: 121, name: '汛限', itemStyle: {color: '#ff4757'} }]
                            }
                        },
                        {
                            name: '降雨量(毫米)',
                            data: rainValues,
                            type: 'bar',
                            yAxisIndex: 1, // 绑定到右侧的倒挂坐标轴
                            itemStyle: { color: '#4a90e2' },
                            barWidth: '40%'
                        }
                    ]
                };

                chart.setOption(option, true);
            } catch (error) {
                console.error("加载图表数据失败", error);
            } finally {
                chart.hideLoading();
            }
        }

        // 页面打开时执行
        fetchReservoirs();

        // 窗口大小改变时自动适配图表尺寸
        window.addEventListener('resize', () => {
            chart.resize();
        });
    </script>
</body>
</html>
